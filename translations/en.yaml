configuration:
  puid:
    name: User ID (PUID)
    description: >-
      The user ID the Calibre process runs as. Default 1000 works for most
      Home Assistant OS installs. If you have the SSH & Web Terminal add-on,
      run `id` to confirm your UID.
  pgid:
    name: Group ID (PGID)
    description: >-
      The group ID the Calibre process runs as. Default 1000 works for most
      Home Assistant OS installs. If you have the SSH & Web Terminal add-on,
      run `id` to confirm your GID.
  timezone:
    name: Timezone
    description: >-
      Your local timezone in tz database format (e.g. America/Chicago,
      Europe/London, Asia/Tokyo). Used for correct timestamps in the Calibre GUI.
  password:
    name: GUI Password
    description: >-
      Optional password to protect the Calibre desktop GUI. Leave empty for
      no authentication. For internet-exposed setups use a reverse proxy instead.
